apiVersion: apps/v1
kind: Deployment
metadata:
  name: vk-nersc
  labels:
    app: vk-nersc
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vk-nersc
  template:
    metadata:
      labels:
        app: vk-nersc
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: vk-nersc
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: SF_API_ENDPOINT
          value: "{{ .Values.sfApiEndpoint }}"
        - name: VK_NODE_NAME
          value: "{{ .Values.vkNodeName }}"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: VK_KUBELET_LISTEN_ADDR
          value: ":{{ .Values.kubeletPort }}"
{{- with .Values.sfapiTransferLocalRoot }}
        - name: SFAPI_TRANSFER_LOCAL_ROOT
          value: "{{ . }}"
{{- end }}
{{- with .Values.extraEnv }}
{{- range . }}
        - name: {{ .name }}
          value: "{{ .value }}"
{{- end }}
{{- end }}
        ports:
        - name: kubelet
          containerPort: {{ .Values.kubeletPort }}
          protocol: TCP
{{- with .Values.resources }}
        resources:
{{ toYaml . | indent 10 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
